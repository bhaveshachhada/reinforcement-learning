default_install_hook_types: [pre-commit, pre-push]
repos:
  - repo: https://github.com
    rev: v0.9.0  # Uses the stable Ruff hook repository
    hooks:
      # 1. Run the linter to fix autoflake/flake8 style issues
      - id: ruff
        args: [ --fix ]
      # 2. Run the formatter to ensure uniform code layout (Optional)
      - id: ruff-format